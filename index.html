<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date &amp; Time Picker with Time Zone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .picker-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: #1a1a2e;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .field { margin-bottom: 20px; }
    select {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      color: #333;
      transition: border-color 0.2s;
    }
    select:focus {
      outline: none;
      border-color: #4a6cf7;
      box-shadow: 0 0 0 3px rgba(74,108,247,0.15);
    }

    /* Calendar */
    .calendar {
      border: 1px solid #e2e6f0;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #4a6cf7;
      color: #fff;
    }
    .cal-header button {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .cal-header button:hover { background: rgba(255,255,255,0.2); }
    .cal-header .cal-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 8px;
      gap: 2px;
    }
    .cal-grid .day-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #999;
      padding: 6px 0;
    }
    .cal-grid .day {
      text-align: center;
      padding: 8px 0;
      font-size: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      color: #333;
      transition: background 0.15s, color 0.15s;
    }
    .cal-grid .day:hover { background: #e8ecff; }
    .cal-grid .day.empty { cursor: default; }
    .cal-grid .day.empty:hover { background: transparent; }
    .cal-grid .day.today {
      font-weight: 700;
      border: 2px solid #4a6cf7;
    }
    .cal-grid .day.selected {
      background: #4a6cf7;
      color: #fff;
      font-weight: 600;
    }
    .cal-grid .day.selected:hover { background: #3a5ce5; }
    .cal-grid .day.other-month { color: #ccc; }

    /* Time slider */
    .time-section { margin-bottom: 20px; }
    .time-display {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .slider-group { margin-bottom: 12px; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 4px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #e2e6f0;
      outline: none;
      transition: background 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #4a6cf7;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(74,108,247,0.4);
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #4a6cf7;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(74,108,247,0.4);
    }
    /* Result */
    .result {
      padding: 16px;
      background: #f7f8fc;
      border-radius: 8px;
      border: 1px solid #e2e6f0;
    }
    .result h2 {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .result .value {
      font-size: 1.05rem;
      color: #1a1a2e;
      word-break: break-word;
    }
    .result .value + .value { margin-top: 8px; }
    .muted { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="picker-card">
    <h1>Date &amp; Time Picker</h1>

    <div class="field">
      <label for="tz-select">Time Zone</label>
      <select id="tz-select"></select>
    </div>

    <label>Date</label>
    <div class="calendar" id="calendar">
      <div class="cal-header">
        <button id="prev-month">&larr;</button>
        <span class="cal-title" id="cal-title"></span>
        <button id="next-month">&rarr;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <label>Time</label>
    <div class="time-section">
      <div class="time-display" id="time-display">12:00 PM</div>
      <div class="slider-group">
        <div class="slider-label"><span>Hour</span><span id="hour-val">12</span></div>
        <input type="range" id="hour-slider" min="0" max="23" value="12">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Minute</span><span id="min-val">00</span></div>
        <input type="range" id="min-slider" min="0" max="59" value="0">
      </div>
    </div>

    <div class="result">
      <h2>Selected Date &amp; Time</h2>
      <div class="value" id="display-local"></div>
      <div class="value muted" id="display-iso"></div>
      <div class="value muted" id="display-utc"></div>
    </div>
  </div>

  <script>
    const tzSelect = document.getElementById('tz-select');
    const displayLocal = document.getElementById('display-local');
    const displayIso = document.getElementById('display-iso');
    const displayUtc = document.getElementById('display-utc');
    const calTitle = document.getElementById('cal-title');
    const calGrid = document.getElementById('cal-grid');
    const hourSlider = document.getElementById('hour-slider');
    const minSlider = document.getElementById('min-slider');
    const hourVal = document.getElementById('hour-val');
    const minVal = document.getElementById('min-val');
    const timeDisplay = document.getElementById('time-display');
    // State
    let viewYear, viewMonth; // calendar navigation
    let selectedDate = null; // "YYYY-MM-DD"

    // Timezones
    const timezones = [
      { value: 'America/New_York',    label: 'Eastern' },
      { value: 'America/Chicago',     label: 'Central' },
      { value: 'America/Denver',      label: 'Mountain' },
      { value: 'America/Los_Angeles', label: 'Pacific' },
    ];
    const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;

    timezones.forEach(tz => {
      const opt = document.createElement('option');
      opt.value = tz.value;
      opt.textContent = tz.label;
      if (tz.value === localTz) opt.selected = true;
      tzSelect.appendChild(opt);
    });

    // --- Calendar ---
    const MONTH_NAMES = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
    const DAY_LABELS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

    function renderCalendar() {
      calTitle.textContent = `${MONTH_NAMES[viewMonth]} ${viewYear}`;
      calGrid.innerHTML = '';

      DAY_LABELS.forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-label';
        el.textContent = d;
        calGrid.appendChild(el);
      });

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      // Empty cells before first day
      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'day empty';
        calGrid.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'day';
        el.textContent = d;
        const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (dateStr === todayStr) el.classList.add('today');
        if (dateStr === selectedDate) el.classList.add('selected');
        el.addEventListener('click', () => {
          selectedDate = dateStr;
          renderCalendar();
          update();
        });
        calGrid.appendChild(el);
      }
    }

    document.getElementById('prev-month').addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    });
    document.getElementById('next-month').addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    });

    // --- Time sliders ---
    function getTimeString() {
      const h = parseInt(hourSlider.value);
      const m = parseInt(minSlider.value);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    function updateTimeDisplay() {
      const h = String(hourSlider.value).padStart(2, '0');
      const m = String(minSlider.value).padStart(2, '0');
      hourVal.textContent = h;
      minVal.textContent = m;
      timeDisplay.textContent = `${h}:${m}`;
    }

    hourSlider.addEventListener('input', () => { updateTimeDisplay(); update(); });
    minSlider.addEventListener('input', () => { updateTimeDisplay(); update(); });

    // --- Timezone helpers ---
    function getPartsInTz(date, tz) {
      const fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      });
      const p = {};
      fmt.formatToParts(date).forEach(({ type, value }) => {
        p[type] = value;
      });
      return {
        date: `${p.year}-${p.month}-${p.day}`,
        time: `${p.hour === '24' ? '00' : p.hour}:${p.minute}`
      };
    }

    function wallClockToUtc(dateStr, timeStr, tz) {
      const guess = new Date(`${dateStr}T${timeStr}:00Z`);
      const parts = getPartsInTz(guess, tz);
      const guessWall = new Date(`${parts.date}T${parts.time}:00Z`);
      const target = new Date(`${dateStr}T${timeStr}:00Z`);
      const diff = target - guessWall;
      const corrected = new Date(guess.getTime() + diff);
      const check = getPartsInTz(corrected, tz);
      if (check.date !== dateStr || check.time !== timeStr) {
        const check2Wall = new Date(`${check.date}T${check.time}:00Z`);
        const diff2 = target - check2Wall;
        return new Date(corrected.getTime() + diff2);
      }
      return corrected;
    }

    // --- Update output ---
    function update() {
      const tz = tzSelect.value;
      const dateVal = selectedDate;
      const timeVal = getTimeString();

      if (!dateVal) {
        displayLocal.textContent = 'Select a date on the calendar';
        displayIso.textContent = '';
        displayUtc.textContent = '';
        return;
      }

      const utcDate = wallClockToUtc(dateVal, timeVal, tz);

      if (!utcDate || isNaN(utcDate)) {
        displayLocal.textContent = 'Invalid date/time';
        displayIso.textContent = '';
        displayUtc.textContent = '';
        return;
      }

      const localFmt = new Intl.DateTimeFormat('en-US', {
        timeZone: tz,
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZoneName: 'longOffset',
        hour12: true
      });

      displayLocal.textContent = localFmt.format(utcDate);
      displayIso.textContent = `ISO (UTC): ${utcDate.toISOString()}`;

      const utcFmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'UTC',
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: true,
        timeZoneName: 'short'
      });
      displayUtc.textContent = `Converted to UTC: ${utcFmt.format(utcDate)}`;
    }

    // --- Initialize ---
    function init() {
      const now = new Date();
      const tz = tzSelect.value;
      const parts = getPartsInTz(now, tz);

      // Set calendar to current month and select today
      const [y, m, d] = parts.date.split('-').map(Number);
      viewYear = y;
      viewMonth = m - 1;
      selectedDate = parts.date;

      // Set time sliders to current time
      const [hour, minute] = parts.time.split(':').map(Number);
      hourSlider.value = hour;
      minSlider.value = minute;

      renderCalendar();
      updateTimeDisplay();
      update();
    }

    tzSelect.addEventListener('change', update);
    init();
  </script>
</body>
</html>
